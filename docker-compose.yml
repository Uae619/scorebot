services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: scorebot_root_2024
      MYSQL_DATABASE: scorebot
      MYSQL_USER: scorebot
      MYSQL_PASSWORD: scorebot_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CHAT_ADAPTER: http
      API_LISTEN: 0.0.0.0:8080
      DATA_STORE: mysql
      DB_USER: scorebot
      DB_PASSWORD: scorebot_pass_2024
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: scorebot
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
